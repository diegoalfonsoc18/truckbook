<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Evita que escáneres de correo precarguen y consuman nada -->
  <meta name="robots" content="noindex, nofollow" />
  <title>Restablecer contraseña · TruckBook</title>
  <style>
    :root { --green: #16A34A; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F7F7F8;
      color: #111;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #555; margin: 0 0 24px; }
    .btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 28px;
      border-radius: 14px;
      width: 100%;
    }
    .muted { font-size: 13px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Restablecer contraseña</h1>
    <p>Te estamos llevando a la app TruckBook para crear tu nueva contraseña…</p>
    <a id="openApp" class="btn" href="#">Abrir TruckBook</a>
    <p class="muted">Si no se abre automáticamente, toca el botón. Asegúrate de tener la app instalada.</p>
  </div>

  <script>
    (function () {
      // Reenviar todos los parámetros (token_hash, type, etc.) al deep link de la app
      var params = window.location.search || "";
      var deepLink = "truckbook://auth/callback" + params;

      var btn = document.getElementById("openApp");
      btn.setAttribute("href", deepLink);

      // Redirección automática al abrir la página
      window.location.replace(deepLink);
    })();
  </script>
</body>
</html>
